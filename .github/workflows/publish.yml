name: Release ZIP

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-zip:
    name: Build PHPMax release ZIP
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          extensions: json, openssl, zip, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Run PHPMax pre-publish gate
        run: just pre-publish-check

      - name: Build release ZIP
        shell: bash
        run: |
          just release-zip
          archive="dist/phpmax-${GITHUB_REF_NAME//\//-}.zip"
          cp dist/phpmax-dev.zip "$archive"
          echo "archive=$archive" >> "$GITHUB_ENV"

      - name: Upload release ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: phpmax-release-zip
          path: ${{ env.archive }}

      - name: Attach ZIP to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.archive }}
