name: Tests

on:
  pull_request:
  push:
    branches: [main, "dev/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpmax:
    name: PHPMax / PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ["7.4", "8.3"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json, openssl, zip, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Run PHPMax pre-publish gate
        run: just pre-publish-check

      - name: Verify release manifest
        run: just release-check

  python-lint:
    name: Python Reference / Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install development dependencies
        run: uv sync --group dev

      - name: Check code formatting
        run: uv run ruff format --check .

      - name: Run Ruff linting
        run: uv run ruff check .

  python-tests:
    name: Python Reference / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install development dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=src/pymax \
            --cov-report=term-missing:skip-covered \
            --cov-report=markdown-append:$GITHUB_STEP_SUMMARY
